<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emojipedia App</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <div id="root"></div>
    <header>
        <div class="header-inner">
            <img style="height:45px" src="https://emojipedia.org/_next/static/media/logo-dark.f50dee2a.png">
            <div class="count">
                <p>Emojies: 4</p>
            </div>
        </div>
    </header>
    <div class="grid-layout">
        <div class="box">
            <img class="avatar" src="https://em-content.zobj.net/source/apple/453/loudly-crying-face_1f62d.png" alt="emo1">
            <h2 class="name">
                Loudly Crying
            </h2>
            <p class="des">
                A yellow face with an open mouth wailing and streams of heavy tears flowing from closed eyes.
            </p>
            
        </div>
        <div class="box">
            <img class="avatar" src="https://em-content.zobj.net/source/apple/453/face-holding-back-tears_1f979.png" alt="emo2">
            <h2 class="name">
                Holding Back Tears
            </h2>
            <p class="des">
                A yellow face with tears welling up at the bottom of its two large eyes.
 
            </p>
        </div>
    </div>
    <script src="index.jsx"></script>
</body>
</html>
